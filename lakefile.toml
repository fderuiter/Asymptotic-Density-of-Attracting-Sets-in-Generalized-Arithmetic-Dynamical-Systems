name = "collatz_formalization"
defaultTargets = ["CollatzFormalization"]

[[lean_lib]]
name = "CollatzFormalization"

[[lean_exe]]
name = "pilot_system"
root = "CollatzFormalization.PilotSystem"

[[require]]
name = "mathlib"
git = "https://github.com/leanprover-community/mathlib4.git"

[[require]]
name = "checkdecls"
git = "https://github.com/PatrickMassot/checkdecls.git"

# Unconditionally required; TOML does not support conditional `meta if get_config?` guards.
[[require]]
name = "doc-gen4"
git = "https://github.com/leanprover/doc-gen4"
rev = "main"
