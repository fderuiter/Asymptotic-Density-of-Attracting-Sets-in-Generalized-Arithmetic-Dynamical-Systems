name = "arithmetic_dynamics"
defaultTargets = ["ArithmeticDynamics"]
lintDriver = "runLinter"

[[lean_lib]]
name = "ArithmeticDynamics"

[[require]]
name = "checkdecls"
git = "https://github.com/PatrickMassot/checkdecls.git"

# Unconditionally required; TOML does not support conditional `meta if get_config?` guards.
[[require]]
name = "doc-gen4"
git = "https://github.com/leanprover/doc-gen4"
rev = "main"

[[require]]
name = "mathlib"
git = "https://github.com/leanprover-community/mathlib4.git"
rev = "e8bf9c44369b9151d46c4703f2fd8718f7149643"

[[lean_exe]]
name = "runLinter"
root = "Mathlib.Tactic.Linter.runLinter"
supportInterpreter = true
